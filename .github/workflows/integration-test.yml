name: Test MLClient (INTEGRATION)

on:
  pull_request:
  push:
    branches:
      - main
jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Kerberos client libraries
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev krb5-user

      - name: Install MLClient with poetry
        run: |
          pip install poetry
          poetry install --extras kerberos

      - name: Start MarkLogic and provision the connection matrix
        run: docker compose -f tests/integration/docker-compose.yaml up -d --build

      - name: Wait for provisioning to complete
        run: |
          for _ in $(seq 1 120); do
            health=$(docker inspect --format '{{.State.Health.Status}}' mlclient_integration)
            state=$(docker inspect --format '{{.State.Status}}' mlclient_integration)
            echo "MarkLogic state: ${state}, health: ${health}"
            [ "${health}" = "healthy" ] && exit 0
            if [ "${state}" = "exited" ]; then
              echo "MarkLogic container exited before becoming healthy" >&2
              docker logs mlclient_integration
              exit 1
            fi
            sleep 10
          done
          echo "MarkLogic did not become healthy in time" >&2
          docker logs mlclient_integration
          exit 1

      - name: Test code with pytest
        env:
          MLCLIENT_IT_CERTS_DIR: tests/integration/.certs
        run: poetry run pytest tests/integration/

      - name: Dump MarkLogic logs on failure
        if: failure()
        run: docker logs mlclient_integration
